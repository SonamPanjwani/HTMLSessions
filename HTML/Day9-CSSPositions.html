<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Positioning Demo</title>
    <link rel="stylesheet" href="../CSS/style5Day9.css" />
  </head>
  <body>
    <!-- STICKY -->
    <div class="sticky">Sticky Header (scroll down)</div>

    <h2>Positioning Demo</h2>

    <div class="outerContainer">
      <div class="container">
        <div class="box static">Static</div>
        <div class="box relative">Relative</div>
        <div class="box absolute">Sale</div>
        <div class="box initial">Initial</div>

        <div class="parent-inherit">
          <div class="box inherit">Inherit</div>
        </div>
      </div>
    </div>
    <!-- FIXED -->
    <div class="box fixed">Fixed</div>
  </body>
</html>
